name: Python Lint

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - '**.py'
      - '.github/workflows/python-lint.yml'
      - 'requirements.txt'

jobs:
  flake8:
    name: Flake8 Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 flake8-docstrings flake8-bugbear flake8-comprehensions

      - name: Run flake8 (Check & Report)
        # 核心优化：合并为一个步骤，加上 --exit-zero 保证必定通行，并补全排除目录
        run: |
          flake8 . \
            --count \
            --exit-zero \
            --max-complexity=15 \
            --max-line-length=127 \
            --statistics \
            --exclude=.git,__pycache__,build,dist,venv,.venv,airflow_home,node_modules,legacy
